volumes:
  xenovrastream-db-volume:
    name: xenovrastream-db-volume
  # Uploads waiting to transcode, ffmpeg scratch space, and the segment cache.
  xenovrastream-work-volume:
    name: xenovrastream-work-volume

networks:
  xenovrastream-network:
    name: xenovrastream-network

services:
  xenovrastream:
    container_name: xenovrastream
    image: xenovrastream
    build: .
    env_file:
      - .env
    # Both sides use ${PORT}: the app binds it inside the container too, so
    # hardcoding the container side would only work when PORT happens to be 8000.
    ports:
      - ${PORT}:${PORT}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - xenovrastream-work-volume:/var/lib/xenovrastream
    networks:
      - xenovrastream-network

  db:
    container_name: xenovrastream_db
    image: postgres:15.0-alpine
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: pg_isready --username=${DATABASE_USER} --dbname=${DATABASE_NAME}
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - xenovrastream-db-volume:/var/lib/postgresql/data
    networks:
      - xenovrastream-network

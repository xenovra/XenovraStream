name: Docker Image CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: xenovra/xenovradrive:latest

  # NOTE: Publishing to Docker Hub is disabled until registry credentials are
  # configured. To re-enable, add REGISTRY_USERNAME and REGISTRY_PASSWORD repo
  # secrets and restore the "Login to Docker Hub" + push (push: true) steps.
